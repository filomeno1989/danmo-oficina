<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhe da Obra — Danmo Oficina</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .timeline { list-style:none; margin-top:8px; }
    .timeline li { padding:10px 14px; border-left:3px solid var(--amber); margin-bottom:8px; border-radius:0 6px 6px 0; background:rgba(255,255,255,0.03); font-size:14px; }
    .timeline .meta { color:var(--text2); font-size:12px; margin-top:2px; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:200; }
    .modal-overlay.aberto { display:flex; }
    .modal-box { background:var(--navy2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:100%; max-width:500px; box-shadow:var(--shadow); max-height:90vh; overflow-y:auto; }
    .checklist { max-height:160px; overflow-y:auto; border:1px solid var(--border); border-radius:6px; padding:8px; }
    .checklist label { display:flex; align-items:center; gap:8px; font-weight:normal; text-transform:none; margin:4px 0; color:var(--text); cursor:pointer; }
    .checklist input[type=checkbox] { width:auto; }
    .avaria-box { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:6px; padding:12px; margin-bottom:12px; font-size:14px; }
    .avaria-box .label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
  </style>
</head>
<body>
  <div id="navbar" class="navbar"></div>
  <main class="main">
    <div class="flex-between mt-16">
      <h1 class="page-title" style="margin-bottom:0" id="titulo-os">Obra —</h1>
      <a href="ordens.html" class="btn btn-ghost">← Voltar</a>
    </div>

    <div class="kpi-grid mt-24">
      <div class="kpi-card"><div class="kpi-label">Equipamento</div><div class="kpi-value" id="info-equip" style="font-size:18px">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Categoria</div><div class="kpi-value" id="info-categoria" style="font-size:18px">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Abertura</div><div class="kpi-value" id="info-abertura" style="font-size:18px">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Fecho</div><div class="kpi-value" id="info-fecho" style="font-size:18px">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Estado Físico</div><div class="kpi-value" id="info-fisico" style="font-size:16px">—</div></div>
      <div class="kpi-card blue"><div class="kpi-label">Workflow</div><div class="kpi-value" id="info-workflow" style="font-size:16px">—</div></div>
    </div>

    <div class="card">
      <div class="avaria-box">
        <div class="label">Avaria / Motivo de entrada</div>
        <div id="info-avaria">—</div>
      </div>
      <div id="info-observacoes-wrap" style="display:none">
        <div class="avaria-box">
          <div class="label">Observações</div>
          <div id="info-observacoes">—</div>
        </div>
      </div>
    </div>

    <!-- Atualizar estado -->
    <div class="card">
      <div class="card-title">Atualizar Estado</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Novo estado do Workflow</label>
          <select id="sel-novo-status">
            <option value="Aberta">Aberta</option>
            <option value="Supervisão">Supervisão</option>
            <option value="Chefe da Oficina">Chefe da Oficina</option>
            <option value="Departamento Técnico">Departamento Técnico</option>
            <option value="CdM">CdM</option>
            <option value="Fechada">Fechada</option>
          </select>
        </div>
        <div class="form-group">
          <label>Responsável</label>
          <select id="responsavel-mudanca">
            <option value="">— Selecionar —</option>
          </select>
        </div>
        <div class="form-group" style="align-self:flex-end">
          <button class="btn btn-primary" id="btn-mudar-status">Atualizar Workflow</button>
        </div>
      </div>
      <div class="form-grid mt-16">
        <div class="form-group">
          <label>Estado Físico da Máquina</label>
          <select id="sel-status-fisico">
            <option value="Avariada">Avariada</option>
            <option value="Acidentada">Acidentada</option>
            <option value="Pneumático">Pneumático</option>
            <option value="Revisão/Manutenção">Revisão/Manutenção</option>
            <option value="Inspeção">Inspeção</option>
            <option value="Aguarda Acessório">Aguarda Acessório</option>
            <option value="Concluído">Concluído</option>
          </select>
        </div>
        <div class="form-group">
          <label>Número de Obra (se ainda não atribuído)</label>
          <input type="text" id="campo-numero-obra" placeholder="Preencher quando CdM atribuir" />
        </div>
        <div class="form-group" style="align-self:flex-end">
          <button class="btn btn-ghost" id="btn-atualizar-fisico">Guardar Alterações</button>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card">
      <div class="card-title">Histórico do Workflow</div>
      <ul class="timeline" id="lista-timeline"><li>A carregar...</li></ul>
    </div>

    <!-- Intervenções -->
    <div class="card">
      <div class="flex-between">
        <div class="card-title" style="margin-bottom:0">Intervenções</div>
        <button class="btn btn-primary btn-sm" id="btn-nova-intervencao">+ Registar Intervenção</button>
      </div>
      <div class="table-wrap mt-16">
        <table>
          <thead>
            <tr><th>Data</th><th>Início</th><th>Fim</th><th>Horas</th><th>Descrição</th><th>Técnicos</th><th>Estado</th><th></th></tr>
          </thead>
          <tbody id="tbody-intervencoes"><tr><td colspan="8">A carregar...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal Intervenção -->
  <div class="modal-overlay" id="modal-intervencao">
    <div class="modal-box">
      <div class="card-title">Registar Intervenção</div>
      <form id="form-intervencao">
        <div class="form-group mt-16">
          <label>Data da Intervenção *</label>
          <input type="date" id="i-data" required />
        </div>
        <div class="form-grid mt-16">
          <div class="form-group">
            <label>Hora Início *</label>
            <input type="time" id="i-inicio" required />
          </div>
          <div class="form-group">
            <label>Hora Fim *</label>
            <input type="time" id="i-fim" required />
          </div>
        </div>
        <div class="form-group mt-16">
          <label>Descrição do Trabalho *</label>
          <textarea id="i-descricao" rows="3" required placeholder="O que foi feito, que avaria foi tratada..."></textarea>
        </div>
        <div class="form-group mt-16">
          <label>Estado</label>
          <select id="i-status">
            <option value="em_curso">Em curso</option>
            <option value="concluida">Concluída</option>
          </select>
        </div>
        <div class="form-group mt-16">
          <label>Técnicos envolvidos</label>
          <div class="checklist" id="i-tecnicos-lista"></div>
        </div>
        <div class="flex-between mt-24" style="justify-content:flex-end;gap:10px">
          <button type="button" class="btn btn-ghost" id="btn-cancelar-intervencao">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="tema.js"></script>
  <script src="nav.js"></script>
  <script>
    renderNavbarOficina('ordens');

    const params = new URLSearchParams(window.location.search);
    const osId = params.get('id');
    let osAtual = null, equipAtual = null, collaboradoresAtivos = [];

    if (!osId) { alert('Obra não especificada.'); window.location.href='ordens.html'; }

    async function carregarOS() {
      const lista = await db.query('ordens_servico', `select=*&id=eq.${osId}`);
      osAtual = lista[0];
      if (!osAtual) { alert('Obra não encontrada.'); window.location.href='ordens.html'; return; }

      const eqLista = await db.query('equipment', `select=*&id=eq.${osAtual.equipment_id}`);
      equipAtual = eqLista[0];

      document.getElementById('titulo-os').textContent = osAtual.numero_obra ? `Obra ${osAtual.numero_obra}` : `Obra s/nº — ${equipAtual ? equipAtual.code : ''}`;
      document.getElementById('info-equip').textContent = equipAtual ? equipAtual.code : '—';
      document.getElementById('info-categoria').textContent = equipAtual ? (equipAtual.fleet_type||'—') : '—';
      document.getElementById('info-abertura').textContent = formatarData(osAtual.data_abertura);
      document.getElementById('info-fecho').textContent = osAtual.data_fecho ? formatarData(osAtual.data_fecho) : '—';
      document.getElementById('info-fisico').textContent = osAtual.status_fisico;
      document.getElementById('info-workflow').textContent = osAtual.status_atual;
      document.getElementById('info-avaria').textContent = osAtual.descricao_avaria || '—';

      if (osAtual.observacoes) {
        document.getElementById('info-observacoes').textContent = osAtual.observacoes;
        document.getElementById('info-observacoes-wrap').style.display = 'block';
      }

      document.getElementById('sel-novo-status').value = osAtual.status_atual;
      document.getElementById('sel-status-fisico').value = osAtual.status_fisico;
      document.getElementById('campo-numero-obra').value = osAtual.numero_obra || '';
    }

    async function carregarTimeline() {
      const log = await db.query('os_status_log', `select=*&os_id=eq.${osId}`);
      const ord = [...log].sort((a,b) => new Date(b.data_mudanca)-new Date(a.data_mudanca));
      const lista = document.getElementById('lista-timeline');
      lista.innerHTML = ord.length === 0 ? '<li>Sem registos.</li>' :
        ord.map(ev => `<li>
          <strong>${ev.status_anterior?ev.status_anterior+' → ':''}${ev.status_novo}</strong>
          ${ev.observacao?' — '+ev.observacao:''}
          <div class="meta">${ev.responsavel?ev.responsavel+' · ':''}${formatarDataHora(ev.data_mudanca)}</div>
        </li>`).join('');
    }

    async function carregarTecnicosCheckbox() {
      collaboradoresAtivos = await db.query('collaborators','select=id,name,setor,code&active=eq.true&order=name.asc');

      // Popular também o select de responsável do workflow
      const selResp = document.getElementById('responsavel-mudanca');
      collaboradoresAtivos.forEach(c => {
        selResp.insertAdjacentHTML('beforeend', `<option value="${c.name}">${c.name}${c.code ? ' ('+c.code+')' : ''}</option>`);
      });

      document.getElementById('i-tecnicos-lista').innerHTML = collaboradoresAtivos
        .map(c => `<label><input type="checkbox" value="${c.id}" /> ${c.name}${c.setor?' — '+c.setor:''}</label>`)
        .join('');
    }

    async function carregarIntervencoes() {
      const records = await db.query('records', `select=*&os_id=eq.${osId}`);
      const tbody = document.getElementById('tbody-intervencoes');
      if (!records.length) { tbody.innerHTML='<tr><td colspan="8">Ainda sem intervenções registadas.</td></tr>'; return; }

      const relacoes = await db.query('record_collaborators','select=*');
      tbody.innerHTML = records
        .sort((a,b) => new Date(b.created_at)-new Date(a.created_at))
        .map(r => {
          const idsColabs = relacoes.filter(rc => rc.record_id === r.id).map(rc => rc.collaborator_id);
          const nomes = idsColabs.map(id => {
            const c = collaboradoresAtivos.find(x => x.id === id);
            return c ? c.name : '—';
          }).join(', ');
          return `<tr>
            <td>${r.shift_date || formatarData(r.created_at)}</td>
            <td>${r.time_start||'—'}</td><td>${r.time_end||'—'}</td>
            <td>${r.hours!=null?r.hours:'—'}</td>
            <td>${r.description||'—'}</td>
            <td>${nomes||'—'}</td>
            <td><span class="badge ${r.status==='concluida'?'badge-green':'badge-amber'}">${r.status==='concluida'?'Concluída':'Em curso'}</span></td>
            <td><button class="btn btn-danger btn-sm" onclick="eliminarIntervencao(${r.id})">Apagar</button></td>
          </tr>`;
        }).join('');
    }

    async function eliminarIntervencao(id) {
      if (!confirm('Apagar esta intervenção?')) return;
      await db.delete('records', id);
      await carregarIntervencoes();
    }

    document.getElementById('btn-mudar-status').addEventListener('click', async () => {
      const novoStatus = document.getElementById('sel-novo-status').value;
      const responsavel = document.getElementById('responsavel-mudanca').value || null;
      if (novoStatus === osAtual.status_atual) { alert('Estado já é o atual.'); return; }
      const upd = { status_atual: novoStatus, atualizado_em: new Date().toISOString() };
      if (novoStatus === 'Fechada') upd.data_fecho = dataHoje();
      await db.update('ordens_servico', osId, upd);
      await db.insert('os_status_log', { os_id: osId, status_anterior: osAtual.status_atual, status_novo: novoStatus, responsavel: responsavel||null });
      await carregarOS(); await carregarTimeline();
      document.getElementById('responsavel-mudanca').value = '';
    });

    document.getElementById('btn-atualizar-fisico').addEventListener('click', async () => {
      const upd = {
        status_fisico: document.getElementById('sel-status-fisico').value,
        atualizado_em: new Date().toISOString()
      };
      const nrObra = document.getElementById('campo-numero-obra').value.trim();
      if (nrObra) upd.numero_obra = nrObra;
      await db.update('ordens_servico', osId, upd);
      await carregarOS();
    });

    const modalIntervencao = document.getElementById('modal-intervencao');
    document.getElementById('btn-nova-intervencao').addEventListener('click', () => {
      document.getElementById('i-data').value = dataHoje();
      modalIntervencao.classList.add('aberto');
    });
    document.getElementById('btn-cancelar-intervencao').addEventListener('click', () => modalIntervencao.classList.remove('aberto'));

    document.getElementById('form-intervencao').addEventListener('submit', async ev => {
      ev.preventDefault();
      const inicio = document.getElementById('i-inicio').value;
      const fim = document.getElementById('i-fim').value;
      const [h1,m1] = inicio.split(':').map(Number);
      const [h2,m2] = fim.split(':').map(Number);
      let horas = (h2+m2/60)-(h1+m1/60);
      if (horas < 0) horas += 24;

      const payload = {
        equipment_id: osAtual.equipment_id,
        os_id: osId,
        shift_date: document.getElementById('i-data').value,
        status: document.getElementById('i-status').value,
        time_start: inicio,
        time_end: fim,
        hours: Math.round(horas*100)/100,
        description: document.getElementById('i-descricao').value.trim(),
        continues: false,
      };

      try {
        const novo = await db.insert('records', payload);
        if (novo && novo.code) throw new Error(novo.message||'Erro');
        const recordId = Array.isArray(novo) ? novo[0].id : novo.id;
        const selecionados = Array.from(document.querySelectorAll('#i-tecnicos-lista input[type=checkbox]:checked')).map(el => el.value);
        for (const colaboradorId of selecionados) {
          await db.insert('record_collaborators', { record_id: recordId, collaborator_id: colaboradorId });
        }
        modalIntervencao.classList.remove('aberto');
        document.getElementById('form-intervencao').reset();
        await carregarIntervencoes();
      } catch(err) {
        console.error(err);
        alert('Erro ao guardar a intervenção: ' + (err.message||err));
      }
    });

    (async function init() {
      await carregarOS();
      await carregarTimeline();
      await carregarTecnicosCheckbox();
      await carregarIntervencoes();
    })();
  </script>
</body>
</html>
