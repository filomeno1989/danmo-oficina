<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ordens de Serviço — Danmo Oficina</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center; z-index: 200;
    }
    .modal-overlay.aberto { display: flex; }
    .modal-box {
      background: var(--navy2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; width: 100%; max-width: 440px; box-shadow: var(--shadow);
      max-height: 90vh; overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="navbar" class="navbar"></div>

  <main class="main">
    <div class="flex-between mt-16">
      <h1 class="page-title" style="margin-bottom:0">Ordens de Serviço</h1>
      <button class="btn btn-primary" id="btn-nova-os">+ Nova Obra</button>
    </div>
    <p class="page-sub">Acompanhamento de obras abertas e fechadas</p>

    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label>Estado do Workflow</label>
          <select id="filtro-status">
            <option value="">Todos os estados</option>
            <option value="Aberta">Aberta</option>
            <option value="Supervisão">Supervisão</option>
            <option value="Chefe da Oficina">Chefe da Oficina</option>
            <option value="Departamento Técnico">Departamento Técnico</option>
            <option value="CdM">CdM</option>
            <option value="Fechada">Fechada</option>
          </select>
        </div>
        <div class="form-group">
          <label>Equipamento</label>
          <select id="filtro-equipamento"><option value="">Todos os equipamentos</option></select>
        </div>
        <div class="form-group">
          <label>Buscar nº obra</label>
          <input type="text" id="filtro-busca" placeholder="Ex: 68012" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nº Obra</th>
              <th>Equipamento</th>
              <th>Categoria</th>
              <th>Abertura</th>
              <th>Fecho</th>
              <th>Estado Físico</th>
              <th>Workflow</th>
            </tr>
          </thead>
          <tbody id="tbody-os">
            <tr><td colspan="7">A carregar...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="modal-nova-os">
    <div class="modal-box">
      <div class="card-title">Nova Ordem de Serviço</div>
      <form id="form-nova-os">
        <div class="form-group mt-16">
          <label>Nº Obra (fornecido pela CdM)</label>
          <input type="text" id="f-numero-obra" required />
        </div>
        <div class="form-group mt-16">
          <label>Equipamento</label>
          <select id="f-equipamento" required></select>
        </div>
        <div class="form-group mt-16">
          <label>Data de Abertura</label>
          <input type="date" id="f-data-abertura" required />
        </div>
        <div class="form-group mt-16">
          <label>Estado Físico</label>
          <select id="f-status-fisico">
            <option value="Avariada">Avariada</option>
            <option value="Acidentada">Acidentada</option>
            <option value="Pneumático">Pneumático</option>
            <option value="Revisão/Manutenção">Revisão/Manutenção</option>
            <option value="Inspeção">Inspeção</option>
          </select>
        </div>
        <div class="form-group mt-16">
          <label>Aberto por</label>
          <select id="f-aberto-por"><option value="">— Selecionar —</option></select>
        </div>
        <div class="form-group mt-16">
          <label>Observações</label>
          <textarea id="f-observacoes" rows="2"></textarea>
        </div>
        <div class="flex-between mt-24" style="justify-content:flex-end;gap:10px">
          <button type="button" class="btn btn-ghost" id="btn-cancelar-os">Cancelar</button>
          <button type="submit" class="btn btn-primary">Criar Obra</button>
        </div>
      </form>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="tema.js"></script>
  <script src="nav.js"></script>
  <script>
    renderNavbarOficina('ordens');

    function badgeFisico(estado) {
      if (estado === 'Avariada' || estado === 'Acidentada') return 'badge-red';
      if (estado === 'Pneumático') return 'badge-amber';
      return 'badge-blue'; // Revisão/Manutenção, Inspeção
    }

    let todasOrdens = [];
    let mapaEquip = {};

    async function carregarEquipamentos() {
      const equipamentos = await db.query('equipment', 'select=*&active=eq.true&order=code.asc');
      equipamentos.forEach((e) => (mapaEquip[e.id] = e));

      const selFiltro = document.getElementById('filtro-equipamento');
      const selForm = document.getElementById('f-equipamento');
      equipamentos.forEach((e) => {
        const label = `${e.code} — ${e.fleet_type || e.name || ''}`;
        selFiltro.insertAdjacentHTML('beforeend', `<option value="${e.id}">${label}</option>`);
        selForm.insertAdjacentHTML('beforeend', `<option value="${e.id}">${label}</option>`);
      });
    }

    async function carregarColaboradores() {
      const colaboradores = await db.query('collaborators', 'select=id,name&active=eq.true&order=name.asc');
      const sel = document.getElementById('f-aberto-por');
      colaboradores.forEach((c) => {
        sel.insertAdjacentHTML('beforeend', `<option value="${c.name}">${c.name}</option>`);
      });
    }

    async function carregarOrdens() {
      todasOrdens = await db.query('ordens_servico', 'select=*');
      renderizarTabela();
    }

    function renderizarTabela() {
      const filtroStatus = document.getElementById('filtro-status').value;
      const filtroEquip = document.getElementById('filtro-equipamento').value;
      const busca = document.getElementById('filtro-busca').value.trim().toLowerCase();

      let lista = [...todasOrdens];
      if (filtroStatus) lista = lista.filter((o) => o.status_atual === filtroStatus);
      if (filtroEquip) lista = lista.filter((o) => String(o.equipment_id) === filtroEquip);
      if (busca) lista = lista.filter((o) => (o.numero_obra || '').toLowerCase().includes(busca));

      lista.sort((a, b) => new Date(b.data_abertura) - new Date(a.data_abertura));

      const tbody = document.getElementById('tbody-os');
      if (lista.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">Nenhuma obra encontrada.</td></tr>';
        return;
      }

      tbody.innerHTML = lista
        .map((o) => {
          const eq = mapaEquip[o.equipment_id] || {};
          return `
          <tr style="cursor:pointer" onclick="window.location.href='os_detalhe.html?id=${o.id}'">
            <td>${o.numero_obra}</td>
            <td>${eq.code || '—'}</td>
            <td>${eq.fleet_type || '—'}</td>
            <td>${formatarData(o.data_abertura)}</td>
            <td>${o.data_fecho ? formatarData(o.data_fecho) : '—'}</td>
            <td><span class="badge ${badgeFisico(o.status_fisico)}">${o.status_fisico}</span></td>
            <td>${o.status_atual}</td>
          </tr>`;
        })
        .join('');
    }

    document.getElementById('filtro-status').addEventListener('change', renderizarTabela);
    document.getElementById('filtro-equipamento').addEventListener('change', renderizarTabela);
    document.getElementById('filtro-busca').addEventListener('input', renderizarTabela);

    const modal = document.getElementById('modal-nova-os');
    document.getElementById('btn-nova-os').addEventListener('click', () => {
      document.getElementById('f-data-abertura').value = dataHoje();
      modal.classList.add('aberto');
    });
    document.getElementById('btn-cancelar-os').addEventListener('click', () => modal.classList.remove('aberto'));

    document.getElementById('form-nova-os').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const payload = {
        numero_obra: document.getElementById('f-numero-obra').value.trim(),
        equipment_id: document.getElementById('f-equipamento').value,
        data_abertura: document.getElementById('f-data-abertura').value,
        status_fisico: document.getElementById('f-status-fisico').value,
        status_atual: 'Aberta',
        aberto_por: document.getElementById('f-aberto-por').value.trim() || null,
        observacoes: document.getElementById('f-observacoes').value.trim() || null,
      };

      try {
        const nova = await db.insert('ordens_servico', payload);
        if (nova && nova.code) throw new Error(nova.message || 'Erro ao criar obra');

        const novaId = Array.isArray(nova) ? nova[0].id : nova.id;
        await db.insert('os_status_log', {
          os_id: novaId,
          status_anterior: null,
          status_novo: 'Aberta',
          responsavel: payload.aberto_por,
          observacao: 'Obra criada',
        });

        modal.classList.remove('aberto');
        document.getElementById('form-nova-os').reset();
        mostrarToast ? mostrarToast('Obra criada com sucesso') : null;
        await carregarOrdens();
      } catch (err) {
        console.error(err);
        if (String(err.message || err).toLowerCase().includes('duplicate') || String(err.message || err).includes('uq_equipamento_numero_obra')) {
          alert('Este número de obra já foi usado para este equipamento. Confirme o número junto da CdM.');
        } else {
          alert('Erro ao criar a obra. Verifique os dados e tente novamente.');
        }
      }
    });

    (async function init() {
      await carregarEquipamentos();
      await carregarColaboradores();
      await carregarOrdens();
    })();
  </script>
</body>
</html>
