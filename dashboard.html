<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Danmo Oficina</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="navbar" class="navbar"></div>

  <main class="main">
    <h1 class="page-title">Dashboard — Oficina</h1>
    <p class="page-sub">Estado atual das máquinas e ordens de serviço</p>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Em Reparação</div>
        <div class="kpi-value" id="kpi-reparacao">—</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Aguarda Peças</div>
        <div class="kpi-value" id="kpi-pecas">—</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Disponível</div>
        <div class="kpi-value" id="kpi-disponivel">—</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Obras por estado do workflow</div>
      <div class="kpi-grid" id="workflow-grid">
        <div class="kpi-card blue"><div class="kpi-label">A carregar</div><div class="kpi-value">…</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Ordens de Serviço abertas</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nº Obra</th>
              <th>Equipamento</th>
              <th>Abertura</th>
              <th>Estado Físico</th>
              <th>Workflow</th>
            </tr>
          </thead>
          <tbody id="tbody-obras-abertas">
            <tr><td colspan="5">A carregar...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="tema.js"></script>
  <script src="nav.js"></script>
  <script>
    renderNavbarOficina('dashboard');

    const ESTADOS_WORKFLOW = ['Aberta', 'Supervisão', 'Chefe da Oficina', 'Departamento Técnico', 'CdM', 'Fechada'];

    function badgeFisico(estado) {
      if (estado === 'Em Reparação') return 'badge-amber';
      if (estado === 'Aguarda Peças') return 'badge-red';
      return 'badge-green';
    }

    async function carregarDashboard() {
      try {
        const ordens = await db.query('ordens_servico', 'select=*');
        const equipamentos = await db.query('equipment', 'select=id,code,name');
        const mapaEquip = {};
        equipamentos.forEach((e) => (mapaEquip[e.id] = e.code || e.name));

        const abertas = ordens.filter((o) => o.status_atual !== 'Fechada');
        const contagemFisico = { 'Em Reparação': 0, 'Aguarda Peças': 0, 'Disponível': 0 };
        abertas.forEach((o) => {
          if (contagemFisico[o.status_fisico] !== undefined) contagemFisico[o.status_fisico]++;
        });

        document.getElementById('kpi-reparacao').textContent = contagemFisico['Em Reparação'];
        document.getElementById('kpi-pecas').textContent = contagemFisico['Aguarda Peças'];
        document.getElementById('kpi-disponivel').textContent = contagemFisico['Disponível'];

        const contagemWorkflow = {};
        ESTADOS_WORKFLOW.forEach((e) => (contagemWorkflow[e] = 0));
        ordens.forEach((o) => {
          if (contagemWorkflow[o.status_atual] !== undefined) contagemWorkflow[o.status_atual]++;
        });

        document.getElementById('workflow-grid').innerHTML = ESTADOS_WORKFLOW.map(
          (estado) => `
          <div class="kpi-card blue">
            <div class="kpi-label">${estado}</div>
            <div class="kpi-value">${contagemWorkflow[estado]}</div>
          </div>`
        ).join('');

        const tbody = document.getElementById('tbody-obras-abertas');
        if (abertas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5">Sem obras abertas no momento.</td></tr>';
        } else {
          tbody.innerHTML = abertas
            .sort((a, b) => new Date(b.data_abertura) - new Date(a.data_abertura))
            .map(
              (o) => `
              <tr style="cursor:pointer" onclick="window.location.href='os_detalhe.html?id=${o.id}'">
                <td>${o.numero_obra}</td>
                <td>${mapaEquip[o.equipment_id] || '—'}</td>
                <td>${formatarData(o.data_abertura)}</td>
                <td><span class="badge ${badgeFisico(o.status_fisico)}">${o.status_fisico}</span></td>
                <td>${o.status_atual}</td>
              </tr>`
            )
            .join('');
        }
      } catch (err) {
        console.error('Erro ao carregar dashboard:', err);
        document.getElementById('tbody-obras-abertas').innerHTML =
          '<tr><td colspan="5">Erro ao carregar dados.</td></tr>';
      }
    }

    carregarDashboard();
  </script>
</body>
</html>
